# ~~ Generated by projen. To modify, edit .projenrc.ts and run "npx projen".

pre-commit:
  commands:
    typecheck:
      run: npx tsc --noEmit -p tsconfig.dev.json
    eslint:
      run: npx eslint --cache --fix {staged_files}
      glob: src/**/*.ts
      stage_fixed: true
    prettier:
      run: npx prettier --write {staged_files}
      glob: src/**/*.ts
      stage_fixed: true
    markdown-prettier:
      run: npx prettier --write --prose-wrap always {staged_files}
      glob: "*.md"
      stage_fixed: true

pre-push:
  commands:
    test:
      run: npm run test

prepare-commit-msg:
  commands:
    commitizen:
      run: exec < /dev/tty && npx cz --hook || true
