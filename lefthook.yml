# ~~ Generated by projen. To modify, edit .projenrc.ts and run "bunx projen".

pre-commit:
  commands:
    typecheck:
      run: npx tsc --noEmit -p tsconfig.dev.json
    biome:
      run: bunx biome check --write {staged_files}
      glob: src/**/*.ts
      stage_fixed: true

pre-push:
  commands:
    bun-test:
      run: bun test {staged_files}

prepare-commit-msg:
  commands:
    commitizen:
      run: exec < /dev/tty && npx cz --hook || true
