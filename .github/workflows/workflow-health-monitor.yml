name: workflow-health-monitor
on:
  workflow_run:
    workflows:
      - build
      - release-please
      - pages
    types:
      - completed
jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Create issue on workflow failure
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |-
            const run = context.payload.workflow_run;
            const allowed = ["failure"];
            if (!allowed.includes(run.conclusion)) return;

            const title = `CI: ${run.name} failed on ${run.head_branch}`;
            const body = [
              '## Workflow Failure Report',
              '',
              `**Workflow:** ${run.name}`,
              `**Branch:** ${run.head_branch}`,
              `**Conclusion:** ${run.conclusion}`,
              `**Run:** [${run.html_url}](${run.html_url})`,
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 100,
            });

            if (issues.find(i => i.title === title)) return;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci-failure'],
            });
